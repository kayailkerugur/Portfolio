services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ilker-kaya-web
    restart: unless-stopped
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

