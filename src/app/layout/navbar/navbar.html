<header class="navbar">
  <div class="navbar__container">
    <a routerLink="/" class="navbar__logo">ilker<span>.</span>kaya</a>

    <nav class="navbar__nav" [class.navbar__nav--open]="menuOpen">
      @for (link of links; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="navbar__link--active"
          class="navbar__link"
          (click)="menuOpen = false"
        >
          {{ link.key | translate }}
        </a>
      }
    </nav>

    <div class="navbar__right">
      <!-- Theme toggle -->
      <button class="theme-btn" (click)="themeService.toggle()" [attr.aria-label]="themeService.isDark() ? 'Açık temaya geç' : 'Koyu temaya geç'">
        @if (themeService.isDark()) {
          <!-- Sun icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
          </svg>
        } @else {
          <!-- Moon icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
          </svg>
        }
      </button>

      <!-- Language switcher -->
      <div class="lang-switcher">
        <button
          class="lang-btn"
          [class.lang-btn--active]="currentLang === 'tr'"
          (click)="switchLang('tr')"
        >TR</button>
        <span class="lang-divider">|</span>
        <button
          class="lang-btn"
          [class.lang-btn--active]="currentLang === 'en'"
          (click)="switchLang('en')"
        >EN</button>
      </div>

      <button
        class="navbar__burger"
        [class.navbar__burger--open]="menuOpen"
        (click)="toggleMenu()"
        aria-label="Menüyü aç/kapat"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>
