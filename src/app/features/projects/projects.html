<section class="page-section">
  <div class="container">
    <h1 class="section-title">Projeler</h1>
    <div class="projects__grid">
      @for (project of projects; track project.title) {
        <article class="project-card">
          <div class="project-card__top">
            <h3 class="project-card__title">{{ project.title }}</h3>
            <span class="project-card__subtitle">{{ project.subtitle }}</span>
          </div>
          <p class="project-card__description">{{ project.description }}</p>
          <ul class="project-card__tags">
            @for (tag of project.tags; track tag) {
              <li class="tag">{{ tag }}</li>
            }
          </ul>
          <div class="project-card__links">
            @if (project.repoUrl) {
              <a [href]="project.repoUrl" target="_blank" rel="noopener" class="link">
                Kaynak Kod
              </a>
            }
            @if (project.liveUrl) {
              <a [href]="project.liveUrl" target="_blank" rel="noopener" class="link link--accent">
                Canlı Demo
              </a>
            }
          </div>
        </article>
      }
    </div>
  </div>
</section>
