<section class="page-section">
  <div class="container">
    <h1 appFadeIn class="section-title">{{ 'skills.title' | translate }}</h1>
    <div class="skills__grid">
      @for (group of groups; track group.category; let i = $index) {
        <div appFadeIn [appFadeIn]="i * 60 + 'ms'" class="skill-group">
          <div class="skill-group__header">
            <span class="skill-group__emoji">{{ group.emoji }}</span>
            <h3 class="skill-group__category">{{ group.category | translate }}</h3>
          </div>
          <div class="skill-group__items">
            @for (skill of group.skills; track skill.name) {
              <div class="skill-chip" [class.skill-chip--primary]="skill.level === 'primary'">
                <span class="skill-chip__icon">
                  @if (skill.icon) {
                    <i [class]="skill.icon + ' colored'"></i>
                  } @else {
                    <span class="skill-chip__emoji">{{ skill.customIcon }}</span>
                  }
                </span>
                <span class="skill-chip__name">{{ skill.name }}</span>
              </div>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
