<section class="hero">
  <div class="hero__bg" aria-hidden="true">
    <div class="hero__orb hero__orb--1"></div>
    <div class="hero__orb hero__orb--2"></div>
    <div class="hero__orb hero__orb--3"></div>
    <div class="hero__grid"></div>
  </div>

  <div class="hero__container">
    <p class="hero__greeting">{{ 'home.greeting' | translate }}</p>
    <h1 class="hero__name">İlker Kaya</h1>
    <h2 class="hero__role">{{ 'home.role' | translate }}</h2>
    <p class="hero__bio">{{ 'home.bio' | translate }}</p>
    <div class="hero__actions">
      <a routerLink="/projects" class="btn btn--primary">{{ 'home.cta_projects' | translate }}</a>
      <a routerLink="/contact" class="btn btn--outline">{{ 'home.cta_contact' | translate }}</a>
    </div>
  </div>
</section>
